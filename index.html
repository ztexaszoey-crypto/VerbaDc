<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VerbaDoc – Study like your exam already exists</title>
  <meta name="description" content="VerbaDoc. For students who want to actually remember what they read."/>
  <meta name="robots" content="index, follow"/>
  <link rel="canonical" href="https://verbadc.com"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;700;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', sans-serif;
      background: #fff;
      color: #1a1a1a;
      line-height: 1.6;
    }
    
    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1.25rem 2rem;
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
    }
    
    .nav-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      text-decoration: none;
      font-weight: 700;
      font-size: 1.2rem;
      color: #1a1a1a;
    }
    
    .nav-logo-icon {
      width: 32px;
      height: 32px;
    }
    
    .nav-cta {
      background: #18917a;
      color: white;
      padding: 0.6rem 1.4rem;
      border-radius: 4px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.9rem;
      transition: background 0.2s;
      border: none;
      cursor: pointer;
    }
    
    .nav-cta:hover {
      background: #0d5c4a;
    }
    
    /* HERO */
    .hero {
      padding: 8rem 2rem 6rem;
      max-width: 1000px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 4rem;
      align-items: center;
      min-height: 100vh;
    }
    
    .hero-content {
      display: flex;
      flex-direction: column;
      gap: 2rem;
    }
    
    .hero-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    
    .hero-logo-icon {
      width: 48px;
      height: 48px;
    }
    
    .hero-logo-text {
      font-family: 'Fraunces', serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: #1a1a1a;
    }
    
    h1 {
      font-family: 'Fraunces', serif;
      font-size: clamp(2.2rem, 6vw, 3.8rem);
      font-weight: 900;
      line-height: 1.1;
      color: #1a1a1a;
    }
    
    h1 em {
      font-style: normal;
      color: #18917a;
    }
    
    .hero-subtext {
      font-size: 1rem;
      color: #666;
      max-width: 400px;
      line-height: 1.7;
    }
    
    /* EMAIL FORM */
    .email-form {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      margin-top: 1rem;
    }
    
    .email-form input {
      padding: 0.9rem 1.2rem;
      border: 2px solid #e0e0e0;
      border-radius: 4px;
      font-size: 1rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    
    .email-form input:focus {
      outline: none;
      border-color: #18917a;
    }
    
    .email-form button {
      background: #18917a;
      color: white;
      border: none;
      padding: 0.9rem 1.2rem;
      border-radius: 4px;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    
    .email-form button:hover {
      background: #0d5c4a;
    }
    
    .form-note {
      font-size: 0.8rem;
      color: #999;
      margin-top: 0.5rem;
    }
    
    /* MASCOT SIDE */
    .hero-mascot {
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .mascot-image {
      width: 100%;
      max-width: 320px;
      height: auto;
      display: block;
    }
    
    /* FOOTER */
    footer {
      border-top: 1px solid #e0e0e0;
      padding: 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #999;
    }
    
    /* RESPONSIVE */
    @media (max-width: 768px) {
      nav {
        padding: 1rem 1.25rem;
      }
      
      .hero {
        grid-template-columns: 1fr;
        padding: 6rem 1.5rem 4rem;
        gap: 2rem;
        min-height: auto;
      }
      
      .hero-mascot {
        order: -1;
      }
      
      h1 {
        font-size: 2rem;
      }
      
      .email-form {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav>
  <a class="nav-logo" href="/">
    <svg class="nav-logo-icon" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
      <rect width="128" height="128" rx="24" fill="#18917a"/>
      <circle cx="40" cy="50" r="14" fill="white"/>
      <circle cx="42" cy="50" r="10" fill="#1a1a1a"/>
      <circle cx="45" cy="46" r="3" fill="white"/>
      <circle cx="88" cy="50" r="14" fill="white"/>
      <circle cx="90" cy="50" r="10" fill="#1a1a1a"/>
      <circle cx="93" cy="46" r="3" fill="white"/>
      <ellipse cx="64" cy="75" rx="20" ry="18" fill="#c89c54"/>
      <path d="M 50 80 Q 64 90 78 80" stroke="#8b6f47" stroke-width="3" fill="none" stroke-linecap="round"/>
      <circle cx="100" cy="35" r="8" fill="#f5c800"/>
    </svg>
    VerbaDoc
  </a>
  <button class="nav-cta" onclick="document.querySelector('.email-form').scrollIntoView({behavior: 'smooth'})">
    Join waitlist
  </button>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <div class="hero-logo">
      <svg class="hero-logo-icon" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
        <rect width="128" height="128" rx="24" fill="#18917a"/>
        <circle cx="40" cy="50" r="14" fill="white"/>
        <circle cx="42" cy="50" r="10" fill="#1a1a1a"/>
        <circle cx="45" cy="46" r="3" fill="white"/>
        <circle cx="88" cy="50" r="14" fill="white"/>
        <circle cx="90" cy="50" r="10" fill="#1a1a1a"/>
        <circle cx="93" cy="46" r="3" fill="white"/>
        <ellipse cx="64" cy="75" rx="20" ry="18" fill="#c89c54"/>
        <path d="M 50 80 Q 64 90 78 80" stroke="#8b6f47" stroke-width="3" fill="none" stroke-linecap="round"/>
        <circle cx="100" cy="35" r="8" fill="#f5c800"/>
      </svg>
      <span class="hero-logo-text">VerbaDoc</span>
    </div>
    
    <h1>Study like your exam <em>already exists.</em></h1>
    
    <p class="hero-subtext">
      Upload what you need to learn. VerbaDoc does the rest. No busywork. No fake progress. Just actual retention.
    </p>
    
    <form class="email-form" action="https://formspree.io/f/xeevyzlv" method="POST">
      <input type="email" name="email" placeholder="your@email.com" required/>
      <button type="submit">Get early access</button>
      <div class="form-note">Early access. No spam. Ever.</div>
    </form>
  </div>
  
  <div class="hero-mascot">
    <img class="mascot-image" src="data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='256' height='256' rx='64' fill='%2318917a'/%3E%3Cellipse cx='86' cy='90' r='28' fill='%238b6f47'/%3E%3Cellipse cx='82' cy='88' r='20' fill='%23c89c54'/%3E%3Cellipse cx='170' cy='90' r='28' fill='%238b6f47'/%3E%3Cellipse cx='174' cy='88' r='20' fill='%23c89c54'/%3E%3Cellipse cx='100' cy='100' r='30' fill='white'/%3E%3Ccircle cx='100' cy='100' r='22' fill='%231a1a1a'/%3E%3Ccircle cx='106' cy='94' r='6' fill='white'/%3E%3Cellipse cx='156' cy='100' r='30' fill='white'/%3E%3Ccircle cx='156' cy='100' r='22' fill='%231a1a1a'/%3E%3Ccircle cx='162' cy='94' r='6' fill='white'/%3E%3Cellipse cx='128' cy='155' r='45' ry='40' fill='%23c89c54'/%3E%3Cpath d='M 105 165 Q 128 185 151 165' stroke='%238b6f47' stroke-width='5' fill='none' stroke-linecap='round'/%3E%3Ccircle cx='200' cy='60' r='16' fill='%23f5c800'/%3E%3C/svg%3E" alt="VerbaDoc mascot"/>
  </div>
</section>

<!-- FOOTER -->
<footer>
  <p>© 2026 VerbaDoc. Built for students who want to actually remember what they read.</p>
</footer>

</body>
</html>
